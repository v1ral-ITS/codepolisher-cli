name: Bug report
description: Report reproducible incorrect behavior in CodePolisher CLI.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve CodePolisher CLI. Never include API keys or credentials.
  - type: input
    id: version
    attributes:
      label: CodePolisher version
      placeholder: 1.1.0
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: 22.x
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - OpenAI
        - Anthropic
        - Google Gemini
        - DeepSeek
        - Venice.ai
        - Groq
        - OpenRouter
        - Ollama
        - Not provider-specific
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the behavior without including sensitive code or credentials.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
