name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Verify release tag matches package version
        run: |
          node -e "const version = require('./package.json').version; const tag = process.env.GITHUB_REF_NAME; if (tag !== 'v' + version) { console.error('Release tag ' + tag + ' does not match package version v' + version); process.exit(1); }"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Check npm registry
        id: registry
        run: |
          package_name=$(node -p "require('./package.json').name")
          package_version=$(node -p "require('./package.json').version")
          if npm view "${package_name}@${package_version}" version --silent > /dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${package_version} is already published; no duplicate publish is needed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: steps.registry.outputs.published != 'true'
        run: npm publish
